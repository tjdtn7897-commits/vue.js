<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const server = `https://jsonplaceholder.typicode.com/posts`;
      // const users = [{ id: 1, title: "..." }];
      // 전체조회
      fetch(`${server}`)
        .then((res) => res.json())
        .then((data) => {
          console.log("전체조회", data);
        })
        .catch((err) => console.log(err));
      const id = 1;
      // 단건조회
      fetch(`${server}/${id}`)
        .then((res) => res.json())
        .then((data) => {
          console.log("단건조회", data);
        })
        .catch((err) => console.log(err));
      const newPost = {
        userId: 4,
        title: "Hello",
        body: "Hi",
      };
      // 등록
      fetch(`${server}`, {
        method: "post",
        headers: {
          "Content-type": "application/json",
        },
        body: JSON.stringify(newPost),
      })
        .then((res) => res.json())
        .then((data) => {
          console.log("등록", data);
        })
        .catch((err) => console.log(err));
      // 수정
      fetch(`${server}/${id}`, {
        method: "put",
        headers: {
          "Content-type": "application/json",
        },
        body: JSON.stringify(newPost),
      })
        .then((res) => res.json())
        .then((data) => {
          console.log("수정", data);
        })
        .catch((err) => console.log(err));
      // 삭제
      fetch(`${server}/${id}`, {
        method: "delete",
      })
        .then((res) => res.json())
        .then((data) => {
          console.log("삭제", data);
        })
        .catch((err) => console.log(err));
    </script>
  </body>
</html>
